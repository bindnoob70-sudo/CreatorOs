version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: creatoros_postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-creatoros_db}
      POSTGRES_USER: ${DATABASE_USER:-creatoros_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-secure-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-creatoros_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - creatoros_network

  redis:
    image: redis:7-alpine
    container_name: creatoros_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - creatoros_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: creatoros_backend
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.docker
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_static:/app/static
      - backend_logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - creatoros_network

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: creatoros_celery
    command: celery -A config worker -l info
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.docker
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    depends_on:
      - redis
      - postgres
      - backend
    networks:
      - creatoros_network

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: creatoros_celery_beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.docker
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres
      - backend
    networks:
      - creatoros_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: creatoros_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NODE_ENV=production
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - creatoros_network

  nginx:
    image: nginx:alpine
    container_name: creatoros_nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - backend_media:/app/media:ro
      - backend_static:/app/static:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - creatoros_network

volumes:
  postgres_data:
  redis_data:
  backend_media:
  backend_static:
  backend_logs:

networks:
  creatoros_network:
    driver: bridge
